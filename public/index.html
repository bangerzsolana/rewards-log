<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rewards — Gib Meme</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'LuckiestGuy';
      src: url('/assets/fonts/LuckiestGuy-Regular.ttf') format('truetype');
    }

    :root {
      --pond-bg: #93fff1;
      --black-border: #101010;
      --radius: 22px;
      --half-radius: 11px;
      --border-width: 2px;
      --card-green: #D0F8D2;
      --body-background: #fff8ec;
      --button-radius: 50px;
      --theme-error: #F23D4F;
      --purple: #b29bf4;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--pond-bg);
      min-height: 100vh;
      padding: 40px 24px 24px;
    }

    .game-font { font-family: 'LuckiestGuy', sans-serif; }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Status ──────────────────────────── */

    .status-bar {
      padding: 8px 16px;
      border-radius: var(--half-radius);
      background: rgba(0,0,0,0.05);
      font-size: 13px;
      color: #555;
      display: none;
    }

    .status-bar.visible { display: block; }

    /* ── White panel ─────────────────────── */

    .rewards-panel {
      background: #ffffff;
      border: var(--border-width) solid var(--black-border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ───────────────────────────── */

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 16px;
    }

    .page-title {
      font-family: 'LuckiestGuy', sans-serif;
      font-size: 28px;
      color: var(--black-border);
      line-height: 1.15;
    }

    /* ── Tabs (GibTabs pattern) ───────────── */

    .tabs {
      display: flex;
      position: relative;
      border: var(--border-width) solid var(--black-border);
      border-radius: 100px;
      background: #fff;
      padding: 4px;
      user-select: none;
      cursor: pointer;
      overflow: hidden;
      flex-shrink: 0;
    }

    .tab {
      flex: 1;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      border: none;
      border-radius: 100px;
      background: transparent;
      color: rgba(0,0,0,0.35);
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
      position: relative;
      z-index: 1;
    }

    .tab.active {
      background: var(--black-border);
      color: #fff;
    }

    /* ── Totals strip ────────────────────── */

    .totals-strip {
      display: flex;
      gap: 12px;
      padding: 0 24px 20px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .totals-strip::-webkit-scrollbar { display: none; }

    .total-box {
      flex: 1 0 0;
      min-width: 160px;
      max-width: 240px;
      background: #f4f4f4;
      border-radius: var(--half-radius);
      padding: 12px 16px 12px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .total-box:first-child {
      background: linear-gradient(135deg, #f0e6ff 0%, #e6f0ff 100%);
    }

    .total-coin {
      width: 56px;
      height: 56px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .total-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .total-box .total-value {
      font-family: 'LuckiestGuy', sans-serif;
      font-size: 24px;
      color: var(--black-border);
      line-height: 1.15;
      white-space: nowrap;
    }

    .total-box:first-child .total-value {
      color: #9945FF;
    }

    .total-box .total-label {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    /* ── Section headers ──────────────────── */

    .section-title {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 800;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 0 24px 10px;
    }

    /* ── Card grid ────────────────────────── */

    .card-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      padding: 0 24px 24px;
    }

    /* ── Reward card — NO border ──────────── */

    .reward-card {
      background: var(--card-green);
      border-radius: var(--half-radius);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 8px;
    }

    .reward-card .stage-icon {
      width: 120px;
      height: 120px;
      background-size: 400% 100%;
      background-repeat: no-repeat;
      flex-shrink: 0;
    }

    .reward-card .tournament-name {
      font-family: 'LuckiestGuy', sans-serif;
      font-size: 16px;
      text-transform: uppercase;
      color: var(--black-border);
      letter-spacing: 0.5px;
      line-height: 1.15;
    }

    .reward-card .rounds-label {
      font-size: 13px;
      color: #555;
      font-weight: 500;
    }


    .reward-card .prizes-list {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }

    .prize-line {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'LuckiestGuy', sans-serif;
      font-size: 14px;
      color: var(--black-border);
      line-height: 1.15;
    }

    .token-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
    }

    .flies-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #01b22e;
      color: #fff;
      border-radius: 100px;
      padding: 4px 10px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 700;
      margin-top: 6px;
    }

    .flies-pill svg {
      width: 14px;
      height: 14px;
    }

    /* ── Battle log placeholder ────────────── */

    .battle-log-placeholder {
      text-align: center;
      padding: 80px 20px;
      color: #999;
      font-size: 15px;
    }

    /* ── Empty / error / loading ───────────── */

    .loading { text-align: center; padding: 40px; font-size: 16px; color: #666; }
    .empty { text-align: center; padding: 60px 20px; color: #999; font-size: 15px; }
    .error-msg { text-align: center; padding: 20px; color: var(--theme-error); font-weight: 600; }

    /* ── Skeleton loading ─────────────────── */

    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }

    .skeleton {
      background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite linear;
      border-radius: 6px;
    }

    .skeleton-card {
      background: var(--card-green);
      border-radius: var(--half-radius);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .skeleton-card .skeleton-img {
      width: 120px;
      height: 120px;
      border-radius: 8px;
    }

    .skeleton-card .skeleton-title {
      width: 80%;
      height: 18px;
    }

    .skeleton-card .skeleton-rounds {
      width: 60%;
      height: 14px;
    }

    .skeleton-card .skeleton-prize {
      width: 70%;
      height: 14px;
    }

    .skeleton-total-box {
      flex: 1 0 0;
      min-width: 160px;
      max-width: 240px;
      background: #f4f4f4;
      border-radius: var(--half-radius);
      padding: 12px 16px 12px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .skeleton-total-box .skeleton-coin {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .skeleton-total-box .skeleton-total-text {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    .skeleton-total-box .skeleton-total-value {
      width: 70%;
      height: 22px;
    }

    .skeleton-total-box .skeleton-total-label {
      width: 50%;
      height: 12px;
    }

    @media (max-width: 700px) {
      .skeleton-card .skeleton-img { width: 90px; height: 90px; }
      .skeleton-total-box { min-width: 150px; padding: 10px 12px 10px 10px; }
      .skeleton-total-box .skeleton-coin { width: 44px; height: 44px; }
    }

    /* ── Responsive ────────────────────────── */

    @media (max-width: 900px) {
      .card-grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 700px) {
      .section-title { padding: 0 16px 8px; }
      .totals-strip { padding: 0 16px 16px; gap: 10px; }
      .total-box { min-width: 150px; padding: 10px 12px 10px 10px; }
      .total-coin { width: 44px; height: 44px; }
      .total-box .total-value { font-size: 20px; }
      .card-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 16px 20px; }
      .reward-card .stage-icon { width: 90px; height: 90px; }
      .reward-card .tournament-name { font-size: 14px; }
      body { padding: 24px 12px 16px; }
      .page-header { padding: 16px 16px 12px; }
      .page-title { font-size: 22px; }
      .tab { font-size: 13px; padding: 7px 16px; }
    }

    @media (max-width: 480px) {
      .card-grid { grid-template-columns: 1fr 1fr; }
      .page-title { font-size: 18px; }
      .tab { font-size: 12px; padding: 6px 12px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="status-bar" id="statusBar"></div>

    <div class="rewards-panel">
      <div class="page-header">
        <span class="page-title" id="pageTitle">REWARDS LOG</span>
        <div class="tabs">
          <button class="tab active" id="tabRewards" onclick="switchTab('rewards')">Rewards</button>
          <button class="tab" id="tabBattle" onclick="switchTab('battle')">Battles</button>
        </div>
      </div>

      <div id="rewardsTab">
        <div id="totalRewardsSection">
          <div class="section-title">Total Rewards</div>
          <div id="totalsStrip" class="totals-strip"></div>
        </div>
        <div id="tournamentRewardsSection" style="display:none">
          <div class="section-title">Tournament Rewards</div>
        </div>
        <div id="cardGrid"></div>
      </div>

      <div id="battleTab" style="display:none">
        <div class="battle-log-placeholder">Nothing here yet.</div>
      </div>
    </div>

    <div style="text-align:center;padding:24px 0 8px">
      <span id="loadNewBtn" style="font-size:13px;color:#888;cursor:pointer;user-select:none" onclick="cycleWallet()">Load new</span>
    </div>
  </div>

  <script>
    const API = window.location.origin;

    const WALLETS = [
      'Acacsff4jU3KRh2xhG4mHan8RtkamW8fU1AWsTNE4Ldo',
      'FAShBHsY6cMvoyCTV1oopUBFKPEkftMTwP9SqCFuQCDo',
      '9DC9GpSzGFwpN7goAZZNP3LvRPHz6mdjRoAd9hVVUyDf',
      '6fE1hveCTvNrE9CWT2aEmwJwhFSQ6WQ3G26utgZL5FRb',
      'B3zU4q7UQ1GBa7Vjro2orBojD9YiFZ3w5UU1WZCyz4Hr',
      'HQ3bmnUrcZHb6V3wooQ77BDBBZL9gt4mmsThfPKKDNnQ',
    ];
    let currentWalletIndex = Math.floor(Math.random() * WALLETS.length);
    let retryTimer = null;

    function getCurrentWallet() {
      return WALLETS[currentWalletIndex];
    }

    function cycleWallet() {
      if (retryTimer) { clearTimeout(retryTimer); retryTimer = null; }
      if (totalsRetryTimer) { clearTimeout(totalsRetryTimer); totalsRetryTimer = null; }
      currentWalletIndex = (currentWalletIndex + 1) % WALLETS.length;
      loadWallet();
    }

    // ── Tab switching ──────────────────────────
    function switchTab(tab) {
      document.getElementById('tabRewards').className = tab === 'rewards' ? 'tab active' : 'tab';
      document.getElementById('tabBattle').className = tab === 'battle' ? 'tab active' : 'tab';
      document.getElementById('rewardsTab').style.display = tab === 'rewards' ? '' : 'none';
      document.getElementById('battleTab').style.display = tab === 'battle' ? '' : 'none';
      document.getElementById('pageTitle').textContent = tab === 'rewards' ? 'REWARDS LOG' : 'BATTLE LOG';
    }

    // ── Sprite sheet assignment ─────────────────
    const SPRITE_SHEETS = [
      '/assets/assets_01.png', '/assets/assets_02.png', '/assets/assets_03.png',
      '/assets/assets_04.png', '/assets/assets_05.png', '/assets/assets_06.png',
      '/assets/assets_07.png', '/assets/assets_08.png', '/assets/assets_09.png',
      '/assets/assets_10.png', '/assets/assets_11.png', '/assets/assets_12.png',
      '/assets/assets_13.png', '/assets/assets_14.png', '/assets/assets_15.png',
      '/assets/assets_16.png', '/assets/assets_17.png',
    ];

    function getSpriteSheet(tournamentIndex) {
      // Shuffle sprite sheets with a fixed seed so the order is random
      // but consistent across page loads, and adjacent tournaments never share colors
      const shuffled = [...SPRITE_SHEETS];
      let seed = 48271;
      for (let i = shuffled.length - 1; i > 0; i--) {
        seed = (seed * 16807) % 2147483647;
        const j = seed % (i + 1);
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled[tournamentIndex % shuffled.length];
    }

    // ── Stage logic ────────────────────────────
    function getStage(lastRound, totalRounds) {
      if (lastRound <= 1) return 0;
      const remaining = totalRounds - 1;
      const lower = 1 + Math.floor(remaining * 0.4);
      const upper = 1 + Math.floor(remaining * 0.8);
      if (lastRound <= lower) return 1;
      if (lastRound <= upper) return 2;
      return 3;
    }

    function stagePosition(stage) {
      // Sprite sheet: 4 assets, each 500px wide in a 2000px image
      // background-position percentages: 0%, 33.333%, 66.666%, 100%
      const positions = ['0%', '33.333%', '66.666%', '100%'];
      return positions[stage] || '0%';
    }

    // ── Skeleton loaders ───────────────────────
    function showSkeletons() {
      // Totals skeleton
      const section = document.getElementById('totalRewardsSection');
      const strip = document.getElementById('totalsStrip');
      section.style.display = '';
      strip.innerHTML = Array(3).fill(`
        <div class="skeleton-total-box">
          <div class="skeleton skeleton-coin"></div>
          <div class="skeleton-total-text">
            <div class="skeleton skeleton-total-value"></div>
            <div class="skeleton skeleton-total-label"></div>
          </div>
        </div>
      `).join('');

      // Cards skeleton
      const tournSection = document.getElementById('tournamentRewardsSection');
      tournSection.style.display = '';
      document.getElementById('cardGrid').innerHTML = `<div class="card-grid">
        ${Array(8).fill(`
          <div class="skeleton-card">
            <div class="skeleton skeleton-img"></div>
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-rounds"></div>
            <div class="skeleton skeleton-prize"></div>
            <div class="skeleton skeleton-prize"></div>
          </div>
        `).join('')}
      </div>`;
    }

    // ── Load wallet ────────────────────────────
    let totalsRetryTimer = null;
    let totalsLoaded = false;

    async function loadWallet() {
      const wallet = getCurrentWallet();
      totalsLoaded = false;
      if (totalsRetryTimer) { clearTimeout(totalsRetryTimer); totalsRetryTimer = null; }

      const status = document.getElementById('statusBar');
      status.className = 'status-bar visible';
      status.textContent = 'Loading rewards from Solana...';

      showSkeletons();

      // Load tournaments and totals independently so one doesn't block the other
      loadTournaments(wallet, status);
      loadTotals(wallet);
    }

    async function loadTournaments(wallet, status) {
      try {
        const res = await fetch(`${API}/api/rewards/tournaments/${wallet}?limit=100`);
        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          throw new Error(errBody.error || `Server error (${res.status})`);
        }

        const data = await res.json();

        if (data.error) {
          document.getElementById('cardGrid').innerHTML = `<div class="error-msg">${data.error}</div>`;
          status.className = 'status-bar';
          return;
        }

        renderCards(data.tournaments);

        // If no data yet (first sync in progress), retry in 5s
        if (data.total === 0 && !retryTimer) {
          status.textContent = 'Syncing wallet data from Solana... reloading shortly.';
          retryTimer = setTimeout(() => { retryTimer = null; loadWallet(); }, 5000);
          return;
        }

        status.textContent = `${data.total} tournaments loaded.`;
        setTimeout(() => { status.className = 'status-bar'; }, 3000);

      } catch (err) {
        document.getElementById('cardGrid').innerHTML = `<div class="error-msg">${err.message}</div>`;
        status.className = 'status-bar';
      }
    }

    async function loadTotals(wallet, attempt) {
      attempt = attempt || 1;
      try {
        const res = await fetch(`${API}/api/rewards/totals/${wallet}`);
        if (!res.ok) return; // silent fail — skeleton stays visible

        const data = await res.json();
        const totals = data.totals || [];
        const nonZero = totals.filter(t => Number(t.amount_parsed) > 0);

        if (nonZero.length) {
          totalsLoaded = true;
          renderTotals(totals);
        } else if (attempt < 12) {
          // Totals might be empty during sync (can take up to 30s) — retry up to 11 times
          totalsRetryTimer = setTimeout(() => loadTotals(wallet, attempt + 1), 3000);
        }
        // If all retries exhausted with no data, skeleton just stays — better than hiding
      } catch (err) {
        // Silent fail — skeleton stays visible rather than hiding
        if (attempt < 12) {
          totalsRetryTimer = setTimeout(() => loadTotals(wallet, attempt + 1), 3000);
        }
      }
    }

    // ── Render totals strip ─────────────────────
    const COIN_IMAGES = {
      SOL: '/assets/coins/SOL.png',
      BONK: '/assets/coins/BONK.png',
      SEND: '/assets/coins/SEND.png',
      POPCAT: '/assets/coins/POPCAT.png',
      MPLX: '/assets/coins/MPLX.png',
      CHONKY: '/assets/coins/CHONKY.png',
      USDC: '/assets/coins/USDC.png',
      SKR: '/assets/coins/SKR.png',
      TROLL: '/assets/coins/TROLL.png',
    };

    function getCoinImage(symbol) {
      return COIN_IMAGES[symbol] || '/assets/coins/placeholder.png';
    }

    function renderTotals(totals) {
      const strip = document.getElementById('totalsStrip');
      const section = document.getElementById('totalRewardsSection');

      // Filter out zero values
      const nonZero = totals.filter(t => Number(t.amount_parsed) > 0);

      // Always keep section visible — skeleton stays if no data yet
      section.style.display = '';

      if (!nonZero.length) return;

      // Sort: SOL first, then alphabetically by symbol
      nonZero.sort((a, b) => {
        if (a.token_symbol === 'SOL') return -1;
        if (b.token_symbol === 'SOL') return 1;
        return (a.token_symbol || '').localeCompare(b.token_symbol || '');
      });

      strip.innerHTML = nonZero.map(t => `
        <div class="total-box">
          <img class="total-coin" src="${getCoinImage(t.token_symbol)}" alt="${escHtml(t.token_symbol)}" />
          <div class="total-text">
            <span class="total-value">${formatTotal(t.amount_parsed)}</span>
            <span class="total-label">${escHtml(t.token_symbol || 'Unknown')}</span>
          </div>
        </div>
      `).join('');
    }

    // ── Render cards ───────────────────────────
    function renderCards(tournaments) {
      const tournSection = document.getElementById('tournamentRewardsSection');
      if (!tournaments || !tournaments.length) {
        document.getElementById('cardGrid').innerHTML = '<div class="empty">No tournament rewards found.</div>';
        tournSection.style.display = 'none';
        return;
      }
      tournSection.style.display = '';

      const html = `<div class="card-grid">
        ${tournaments.map((t, i) => {
          const lastRound = t.last_round || 0;
          const totalRounds = t.total_rounds || 1;
          const stage = getStage(lastRound, totalRounds);
          const name = t.tournament_name || 'Tournament #' + (t.tournament_index || '?');
          const prizes = t.computed_prizes || [];
          const sprite = getSpriteSheet(t.tournament_index || i);

          return `
            <div class="reward-card">
              <div class="stage-icon" style="background-image: url('${sprite}'); background-position: ${stagePosition(stage)} 0"></div>
              <div class="tournament-name">${escHtml(name)}</div>
              <div class="rounds-label">You won ${lastRound} round${lastRound !== 1 ? 's' : ''}</div>
              ${stage === 0 ? '' : `<div class="prizes-list">
                ${prizes.map(p => `
                  <div class="prize-line">
                    <span class="token-dot"></span>
                    +${formatNumber(p.parsed)} ${p.symbol}
                  </div>
                `).join('')}
              </div>`}
              <div class="flies-pill">

    // ── Helpers ─────────────────────────────────
    function formatTotal(n) {
      n = Number(n);
      if (isNaN(n) || n === 0) return '0';
      if (n >= 1000000) return (n / 1000000).toFixed(2) + 'M';
      if (n >= 10000) return (n / 1000).toFixed(2) + 'K';
      if (n >= 1000) return n.toLocaleString('en-US', { maximumFractionDigits: 1 });
      if (n < 1) return n.toFixed(4);
      return n.toFixed(1);
    }

    function formatNumber(n) {
      n = Number(n);
      if (isNaN(n)) return '0';
      if (n >= 1000) return n.toLocaleString('en-US', { maximumFractionDigits: 2 });
      if (n < 0.001 && n > 0) return n.toFixed(4);
      return n.toLocaleString('en-US', { maximumFractionDigits: 4 });
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
